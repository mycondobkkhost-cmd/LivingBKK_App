name: livingbkk
description: LivingBKK — Bangkok metro property · Rent · Buy · Sell
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"  # Flutter 3.19.6 / Dart 3.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: 2.3.4
  google_fonts: ^6.2.1
  go_router: ^13.2.0
  flutter_dotenv: ^5.2.1
  intl: ^0.18.1
  google_maps_flutter: ^2.6.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^11.1.0
  image_picker: ^1.0.7
  permission_handler: ^11.0.1
  share_plus: ^7.2.2
  url_launcher: ^6.3.0
  http: ^1.2.0
  crypto: ^3.0.3
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.4
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

dependency_overrides:
  postgrest: 2.1.4

flutter:
  uses-material-design: true
  assets:
    - assets/env
    - assets/brand/
    - assets/data/search_display_index.json
